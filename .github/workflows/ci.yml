name: Examples CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "brikbyteos-cli ref to test"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: brikbyteos-examples-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  NODE_VERSION: "20"
  CLI_REPOSITORY: "BrikByte-Studios/brikbyteos-cli"
  CLI_REF: ${{ inputs.cli_ref || 'main' }}

jobs:
  verify:
    name: Verify • ${{ matrix.os }} • ${{ matrix.fixture }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        fixture: [jest-basic, jest-ts-basic]

    steps:
      # --- Checkout ---
      - name: Checkout examples
        uses: actions/checkout@v6

      - name: Checkout CLI
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CLI_REPOSITORY }}
          ref: ${{ env.CLI_REF }}
          path: brikbyteos-cli

      # --- Setup Go ---
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: brikbyteos-cli/go.mod
          cache: true
          cache-dependency-path: brikbyteos-cli/go.sum

      # --- Setup Node ---
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: fixtures/${{ matrix.fixture }}/package-lock.json

      # --- Toolchain visibility ---
      - name: Show toolchain
        run: |
          go version
          node --version
          npm --version

      # --- Build CLI ---
      - name: Build bb
        working-directory: brikbyteos-cli
        run: |
          go build -trimpath -o bin/bb ./cmd/bb

      # --- Install dependencies ---
      - name: Install deps
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # --- Ensure Jest is resolvable ---
      - name: Ensure Jest binary
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          ls -la node_modules/.bin
          test -f node_modules/.bin/jest || test -f node_modules/.bin/jest.cmd

      # --- Add local bin to PATH ---
      - name: Add node_modules bin to PATH
        working-directory: fixtures/${{ matrix.fixture }}
        run: echo "$PWD/node_modules/.bin" >> $GITHUB_PATH

      # --- Baseline Jest ---
      - name: Baseline Jest
        working-directory: fixtures/${{ matrix.fixture }}
        run: |
          npm test -- --json --outputFile baseline.json
          cat baseline.json


      - name: Run bb pass 1
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -uo pipefail
          echo "PWD=$PWD"
          ls -la
          ls -la ../../brikbyteos-cli/bin || true
          ../../brikbyteos-cli/bin/bb run --adapter jest --workdir . --json > out1.json
          echo "--- out1.json ---"
          cat out1.json || true

      - name: Run bb pass 2
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -uo pipefail
          echo "PWD=$PWD"
          ls -la
          ls -la ../../brikbyteos-cli/bin || true
          ../../brikbyteos-cli/bin/bb run --adapter jest --workdir . --json > out2.json
          echo "--- out2.json ---"
          cat out2.json || true

      # --- Validate results ---
      - name: Validate outputs
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -uo pipefail

          echo "PWD=$PWD"
          ls -la

          if [ ! -f out1.json ]; then
            echo "out1.json does not exist"
            exit 1
          fi

          if [ ! -f out2.json ]; then
            echo "out2.json does not exist"
            exit 1
          fi

          echo "--- out1.json ---"
          cat out1.json || true
          echo "--- out2.json ---"
          cat out2.json || true

          if [ ! -s out1.json ]; then
            echo "out1.json exists but is empty"
            exit 1
          fi

          if [ ! -s out2.json ]; then
            echo "out2.json exists but is empty"
            exit 1
          fi

          node -e "
          const fs = require('fs');

          const raw1 = fs.readFileSync('out1.json', 'utf8').trim();
          const raw2 = fs.readFileSync('out2.json', 'utf8').trim();

          if (!raw1) {
            console.error('out1.json is empty after trim');
            process.exit(1);
          }

          if (!raw2) {
            console.error('out2.json is empty after trim');
            process.exit(1);
          }

          const a = JSON.parse(raw1);
          const b = JSON.parse(raw2);

          function assert(cond, msg) {
            if (!cond) {
              console.error(msg);
              process.exit(1);
            }
          }

          assert(a.command === 'run', 'invalid command');
          assert(a.status === 'ok', 'status not ok');

          const results = a.data && a.data.results;
          assert(Array.isArray(results), 'results missing');
          assert(results.length === 1, 'expected exactly one result');

          const r = results[0];
          assert(r.adapter_name === 'jest', 'wrong adapter');
          assert(r.raw_status === 'succeeded', 'jest did not succeed');
          assert(r.normalized_present === true, 'normalized missing');
          assert(r.normalization_failed === false, 'normalization failed');

          if (JSON.stringify(a) !== JSON.stringify(b)) {
            console.error('non-deterministic output');
            process.exit(1);
          }
          "

      # --- Upload artifacts ---
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.fixture }}
          path: |
            fixtures/${{ matrix.fixture }}/baseline.json
            fixtures/${{ matrix.fixture }}/out1.json
            fixtures/${{ matrix.fixture }}/out2.json
          retention-days: 14