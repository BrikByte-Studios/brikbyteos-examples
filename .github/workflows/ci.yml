name: Examples CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "brikbyteos-cli ref to test"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: brikbyteos-examples-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  NODE_VERSION: "20"
  CLI_REPOSITORY: "BrikByte-Studios/brikbyteos-cli"
  CLI_REF: ${{ inputs.cli_ref || 'main' }}

jobs:
  verify:
    name: Verify • ${{ matrix.os }} • ${{ matrix.fixture }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        fixture: [
          jest-basic, 
          jest-ts-basic, 
          playwright-basic, 
          playwright-ts-basic,
          trivy-basic,
          k6-basic,
        ]

    steps:
      - name: Checkout examples
        uses: actions/checkout@v6

      - name: Checkout CLI
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CLI_REPOSITORY }}
          ref: ${{ env.CLI_REF }}
          path: brikbyteos-cli

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: brikbyteos-cli/go.mod
          cache: true
          cache-dependency-path: brikbyteos-cli/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: fixtures/${{ matrix.fixture }}/package-lock.json

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          go version
          node --version
          npm --version

      - name: Build bb
        working-directory: brikbyteos-cli
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          go build -trimpath -o bin/bb ./cmd/bb

      - name: Resolve fixture adapter
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.fixture }}" in
            playwright-basic|playwright-ts-basic)
              echo "FIXTURE_ADAPTER=playwright" >> "$GITHUB_ENV"
              ;;
            trivy-basic)
              echo "FIXTURE_ADAPTER=trivy" >> "$GITHUB_ENV"
              ;;
            k6-basic)
              echo "FIXTURE_ADAPTER=k6" >> "$GITHUB_ENV"
              ;;
            *)
              echo "FIXTURE_ADAPTER=jest" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Set bb path
        shell: bash
        run: |
          set -euo pipefail
          echo "BB_CLI=$GITHUB_WORKSPACE/brikbyteos-cli/bin/bb" >> "$GITHUB_ENV"

      - name: Install deps
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install k6
        if: matrix.fixture == 'k6-basic'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo gpg -k || true
            sudo apt-get update
            sudo apt-get install -y gnupg software-properties-common
            curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install -y k6
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install k6
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install k6
          fi

          k6 version

      - name: Install Trivy
        if: matrix.fixture == 'trivy-basic'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install trivy
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install trivy
          fi

          trivy --version

      - name: Ensure Jest binary
        if: matrix.fixture == 'jest-basic' || matrix.fixture == 'jest-ts-basic'
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          ls -la node_modules/.bin
          test -f node_modules/.bin/jest || test -f node_modules/.bin/jest.cmd

      - name: Ensure Playwright binary
        if: matrix.fixture == 'playwright-basic' || matrix.fixture == 'playwright-ts-basic'
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          ls -la node_modules/.bin
          test -f node_modules/.bin/playwright || test -f node_modules/.bin/playwright.cmd

      - name: Install Playwright browsers
        if: matrix.fixture == 'playwright-basic' || matrix.fixture == 'playwright-ts-basic'
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install chromium

      - name: Add local bin to PATH
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Baseline fixture
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          npm test > baseline.out 2>&1 || (cat baseline.out && exit 1)
          cat baseline.out

      - name: Debug k6 directly
        if: matrix.fixture == 'k6-basic'
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          k6 run script.js

      - name: Debug Trivy directly
        if: matrix.fixture == 'trivy-basic'
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          trivy fs --format json --quiet . > trivy-direct.json
          test -s trivy-direct.json
          echo "--- trivy-direct.json ---"
          cat trivy-direct.json

      - name: Run bb pass 1
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$PWD"
          ls -la
          ls -la "$GITHUB_WORKSPACE/brikbyteos-cli/bin" || true
          "$BB_CLI" run --adapter "$FIXTURE_ADAPTER" --workdir . --json > out1.json
          test -s out1.json
          echo "--- out1.json ---"
          cat out1.json

      - name: Run bb pass 2
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$PWD"
          ls -la
          ls -la "$GITHUB_WORKSPACE/brikbyteos-cli/bin" || true
          "$BB_CLI" run --adapter "$FIXTURE_ADAPTER" --workdir . --json > out2.json
          test -s out2.json
          echo "--- out2.json ---"
          cat out2.json

      - name: Validate outputs
        working-directory: fixtures/${{ matrix.fixture }}
        shell: bash
        env:
          FIXTURE_ADAPTER: ${{ env.FIXTURE_ADAPTER }}
        run: |
          set -uo pipefail

          echo "PWD=$PWD"
          ls -la

          if [ ! -f out1.json ]; then
            echo "out1.json does not exist"
            exit 1
          fi

          if [ ! -f out2.json ]; then
            echo "out2.json does not exist"
            exit 1
          fi

          echo "--- out1.json ---"
          cat out1.json || true
          echo "--- out2.json ---"
          cat out2.json || true

          if [ ! -s out1.json ]; then
            echo "out1.json exists but is empty"
            exit 1
          fi

          if [ ! -s out2.json ]; then
            echo "out2.json exists but is empty"
            exit 1
          fi

          node -e "
          const fs = require('fs');

          const raw1 = fs.readFileSync('out1.json', 'utf8').trim();
          const raw2 = fs.readFileSync('out2.json', 'utf8').trim();

          if (!raw1) {
            console.error('out1.json is empty after trim');
            process.exit(1);
          }

          if (!raw2) {
            console.error('out2.json is empty after trim');
            process.exit(1);
          }

          const a = JSON.parse(raw1);
          const b = JSON.parse(raw2);

          function assert(cond, msg) {
            if (!cond) {
              console.error(msg);
              process.exit(1);
            }
          }

          const expectedAdapter = process.env.FIXTURE_ADAPTER;

          assert(a.command === 'run', 'invalid command');
          assert(a.status === 'ok', 'status not ok');

          const results = a.data && a.data.results;
          assert(Array.isArray(results), 'results missing');
          assert(results.length === 1, 'expected exactly one result');

          const r = results[0];
          assert(r.adapter_name === expectedAdapter, 'wrong adapter');
          assert(r.raw_status === 'succeeded', expectedAdapter + ' did not succeed');
          assert(r.normalized_present === true, 'normalized missing');
          assert(r.normalization_failed === false, 'normalization failed');

          if (JSON.stringify(a) !== JSON.stringify(b)) {
            console.error('non-deterministic output');
            process.exit(1);
          }
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.fixture }}
          path: |
            fixtures/${{ matrix.fixture }}/baseline.out
            fixtures/${{ matrix.fixture }}/out1.json
            fixtures/${{ matrix.fixture }}/out2.json
          retention-days: 14